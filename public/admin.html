<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — PIT Freight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN ── */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0f2340 0%, #1a3a5c 100%);
    }
    .login-box {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 80px rgba(0,0,0,.25);
      text-align: center;
    }
    .login-logo { font-size: 48px; margin-bottom: 12px; }
    .login-title { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: #6e6e73; margin-bottom: 32px; }
    .login-input {
      width: 100%; padding: 14px 16px; border: 1.5px solid #e0e0e5;
      border-radius: 12px; font-size: 16px; font-family: inherit;
      color: #1d1d1f; margin-bottom: 16px; transition: border-color .2s;
      background: #f5f5f7;
    }
    .login-input:focus { outline: none; border-color: #0071e3; background: #fff; }
    .login-btn {
      width: 100%; padding: 14px; background: #0071e3; color: #fff;
      border: none; border-radius: 980px; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .login-btn:hover { background: #0077ed; }
    .login-error { color: #e74c3c; font-size: 13px; margin-top: 10px; min-height: 18px; }

    /* ── LAYOUT ── */
    #adminPage { display: none; }
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,.85);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(0,0,0,.08);
      padding: 0 32px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; color: #1d1d1f; }
    .topbar-brand span { font-size: 22px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .topbar-link {
      color: #pitfreight;
      font-size: 13px; color: #6e6e73; text-decoration: none;
      padding: 6px 14px; border-radius: 980px; transition: background .2s;
    }
    .topbar-link:hover { background: #f5f5f7; color: #1d1d1f; }
    .btn-logout {
      background: none; border: 1.5px solid #e0e0e5; color: #6e6e73;
      padding: 6px 16px; border-radius: 980px; font-size: 13px; cursor: pointer;
      font-family: inherit; transition: all .2s;
    }
    .btn-logout:hover { border-color: #e74c3c; color: #e74c3c; }

    .main { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }

    /* ── STATS ── */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 40px; }
    .stat-card {
      background: #fff; border-radius: 18px; padding: 24px 28px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 2px 20px rgba(0,0,0,.06);
    }
    .stat-label { font-size: 12px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #6e6e73; margin-bottom: 8px; }
    .stat-num { font-size: 40px; font-weight: 700; letter-spacing: -0.03em; }
    .stat-num.pending  { color: #f59e0b; }
    .stat-num.published { color: #22c55e; }
    .stat-num.rejected  { color: #ef4444; }

    /* ── TABS ── */
    .tabs-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .tab-btn {
      padding: 8px 20px; border-radius: 980px; font-size: 14px; font-weight: 500;
      border: 1.5px solid #e0e0e5; background: #fff; color: #6e6e73;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .tab-btn.active { background: #1d1d1f; color: #fff; border-color: #1d1d1f; }
    .tab-btn .count {
      display: inline-flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,.25); color: inherit;
      width: 20px; height: 20px; border-radius: 50%; font-size: 11px;
      font-weight: 700; margin-left: 6px;
    }
    .tab-btn:not(.active) .count { background: #f5f5f7; color: #1d1d1f; }

    /* ── PRODUCT CARDS ── */
    #productList { display: flex; flex-direction: column; gap: 16px; }

    .product-card {
      background: #fff; border-radius: 20px; padding: 24px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow: 0 2px 16px rgba(0,0,0,.06);
      display: grid; grid-template-columns: 100px 1fr auto;
      gap: 20px; align-items: center;
      transition: box-shadow .3s;
    }
    .product-card:hover { box-shadow: 0 8px 40px rgba(0,0,0,.10); }

    .product-img {
      width: 100px; height: 100px; border-radius: 14px;
      object-fit: cover; background: #f5f5f7;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; flex-shrink: 0; overflow: hidden;
    }
    .product-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }

    .product-info {}
    .product-name { font-size: 17px; font-weight: 700; color: #1d1d1f; margin-bottom: 4px; letter-spacing: -0.01em; }
    .product-name-en { font-size: 13px; color: #6e6e73; margin-bottom: 8px; }
    .product-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .meta-tag {
      background: #f5f5f7; color: #424245;
      padding: 3px 10px; border-radius: 980px; font-size: 12px; font-weight: 500;
    }
    .meta-tag.cat  { background: #e8f4fd; color: #0071e3; }
    .meta-tag.date { background: #f5f5f7; color: #6e6e73; }
    .seller-info { font-size: 13px; color: #6e6e73; display: flex; flex-wrap: wrap; gap: 12px; }
    .seller-info span { display: flex; align-items: center; gap: 4px; }

    .product-desc {
      font-size: 13px; color: #6e6e73; margin-top: 8px; line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    .product-actions { display: flex; flex-direction: column; gap: 10px; min-width: 130px; }
    .btn-approve {
      background: #22c55e; color: #fff; border: none;
      padding: 11px 20px; border-radius: 980px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-approve:hover { background: #16a34a; }
    .btn-reject {
      background: none; color: #ef4444; border: 1.5px solid #fca5a5;
      padding: 11px 20px; border-radius: 980px; font-size: 14px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-reject:hover { background: #fef2f2; border-color: #ef4444; }

    .empty-state {
      text-align: center; padding: 80px 40px;
      color: #6e6e73; font-size: 15px;
      background: #fff; border-radius: 20px;
      border: 1px solid rgba(0,0,0,.06);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* Loading */
    .loading-wrap { text-align: center; padding: 60px; }
    .spinner {
      display: inline-block; width: 32px; height: 32px; border-radius: 50%;
      border: 3px solid #e0e0e5; border-top-color: #0071e3;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1d1d1f; color: #fff; padding: 14px 28px;
      border-radius: 14px; font-size: 14px; font-weight: 500;
      z-index: 9999; box-shadow: 0 8px 32px rgba(0,0,0,.25);
      transition: opacity .3s; white-space: nowrap;
    }
    .toast.success { background: #16a34a; }
    .toast.error   { background: #dc2626; }

    /* Reject Modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      backdrop-filter: blur(4px); z-index: 500;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .modal-box {
      background: #fff; border-radius: 22px; padding: 36px;
      max-width: 440px; width: 100%;
      box-shadow: 0 24px 80px rgba(0,0,0,.2);
    }
    .modal-title { font-size: 19px; font-weight: 700; margin-bottom: 8px; color: #1d1d1f; }
    .modal-sub { font-size: 14px; color: #6e6e73; margin-bottom: 20px; }
    .modal-textarea {
      width: 100%; padding: 12px 14px; border: 1.5px solid #e0e0e5;
      border-radius: 12px; font-size: 14px; font-family: inherit;
      resize: vertical; min-height: 100px; color: #1d1d1f;
      transition: border-color .2s;
    }
    .modal-textarea:focus { outline: none; border-color: #0071e3; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-cancel {
      flex: 1; padding: 12px; border: 1.5px solid #e0e0e5; background: none;
      border-radius: 980px; font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: all .2s; color: #6e6e73;
    }
    .btn-cancel:hover { background: #f5f5f7; }
    .btn-confirm-reject {
      flex: 1; padding: 12px; background: #ef4444; color: #fff; border: none;
      border-radius: 980px; font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: background .2s;
    }
    .btn-confirm-reject:hover { background: #dc2626; }

    @media (max-width: 700px) {
      .stats-grid { grid-template-columns: 1fr; }
      .product-card { grid-template-columns: 1fr; }
      .product-img { width: 100%; height: 160px; }
      .product-actions { flex-direction: row; }
      .btn-approve, .btn-reject { flex: 1; }
      .topbar { padding: 0 16px; }
      .main { padding: 24px 16px; }
    }
  </style>
</head>
<body>

<!-- ── LOGIN PAGE ── -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">🚢</div>
    <div class="login-title">PIT Freight Admin</div>
    <div class="login-sub">กรุณาใส่รหัสผ่านเพื่อเข้าสู่ระบบ</div>
    <input type="password" id="passwordInput" class="login-input"
           placeholder="รหัสผ่าน Admin" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">เข้าสู่ระบบ →</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── ADMIN PAGE ── -->
<div id="adminPage">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <span>🚢</span> PIT Freight Admin
    </div>
    <div class="topbar-right">
      <a href="https://pitfreight.com" target="_blank" class="topbar-link">← กลับ Web</a>
      <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">รอตรวจสอบ</div>
        <div class="stat-num pending" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">อนุมัติแล้ว</div>
        <div class="stat-num published" id="statPublished">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ปฏิเสธแล้ว</div>
        <div class="stat-num rejected" id="statRejected">—</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-row">
      <button class="tab-btn active" id="tabPending"   onclick="switchTab('Pending')">
        รอตรวจสอบ <span class="count" id="countPending">0</span>
      </button>
      <button class="tab-btn" id="tabPublished" onclick="switchTab('Published')">
        อนุมัติแล้ว <span class="count" id="countPublished">0</span>
      </button>
      <button class="tab-btn" id="tabRejected"  onclick="switchTab('Rejected')">
        ปฏิเสธแล้ว <span class="count" id="countRejected">0</span>
      </button>
    </div>

    <!-- Product list -->
    <div id="productList">
      <div class="loading-wrap"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- ── REJECT MODAL ── -->
<div id="rejectModal" class="modal-backdrop" style="display:none">
  <div class="modal-box">
    <div class="modal-title">❌ ปฏิเสธสินค้า</div>
    <div class="modal-sub">ระบุเหตุผล (ไม่บังคับ) เพื่อแจ้งผู้ขาย</div>
    <textarea id="rejectReason" class="modal-textarea" placeholder="เช่น ข้อมูลไม่ครบถ้วน / ภาพสินค้าไม่ชัด / ไม่เหมาะสม"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeRejectModal()">ยกเลิก</button>
      <button class="btn-confirm-reject" onclick="confirmReject()">ยืนยันปฏิเสธ</button>
    </div>
  </div>
</div>

<script>
  const API = '';
  let authToken = '';
  let currentTab = 'Pending';
  let rejectTargetId = '';

  // ── AUTH ──────────────────────────────────────────────
  function login() {
    const password = document.getElementById('passwordInput').value.trim();
    if (!password) return;
    document.getElementById('loginError').textContent = '';

    fetch(`${API}/api/admin/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        authToken = data.token;
        localStorage.setItem('pitAdminToken', authToken);
        showAdminPage();
      } else {
        document.getElementById('loginError').textContent = data.error || 'รหัสผ่านไม่ถูกต้อง';
      }
    })
    .catch(() => {
      document.getElementById('loginError').textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
    });
  }

  function logout() {
    authToken = '';
    localStorage.removeItem('pitAdminToken');
    document.getElementById('adminPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('passwordInput').value = '';
  }

  function showAdminPage() {
    document.getElementById('loginPage').style.display  = 'none';
    document.getElementById('adminPage').style.display = 'block';
    loadStats();
    loadProducts('Pending');
  }

  // ── STATS ─────────────────────────────────────────────
  function loadStats() {
    fetch(`${API}/api/admin/stats`, { headers: { Authorization: `Bearer ${authToken}` } })
    .then(r => r.json())
    .then(data => {
      document.getElementById('statPending').textContent   = data.pending   ?? 0;
      document.getElementById('statPublished').textContent = data.published ?? 0;
      document.getElementById('statRejected').textContent  = data.rejected  ?? 0;
      document.getElementById('countPending').textContent   = data.pending   ?? 0;
      document.getElementById('countPublished').textContent = data.published ?? 0;
      document.getElementById('countRejected').textContent  = data.rejected  ?? 0;
    })
    .catch(() => {});
  }

  // ── TABS ──────────────────────────────────────────────
  function switchTab(status) {
    currentTab = status;
    ['Pending','Published','Rejected'].forEach(s => {
      document.getElementById(`tab${s}`).classList.toggle('active', s === status);
    });
    loadProducts(status);
  }

  // ── PRODUCTS ──────────────────────────────────────────
  function loadProducts(status) {
    const list = document.getElementById('productList');
    list.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';

    fetch(`${API}/api/admin/products?status=${status}`, { headers: { Authorization: `Bearer ${authToken}` } })
    .then(r => r.json())
    .then(data => {
      if (!data.products?.length) {
        list.innerHTML = `<div class="empty-state"><div class="icon">${status==='Pending'?'🕐':status==='Published'?'✅':'❌'}</div>ไม่มีสินค้าในหมวดนี้</div>`;
        return;
      }
      list.innerHTML = data.products.map(p => renderCard(p)).join('');
    })
    .catch(() => {
      list.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div>โหลดข้อมูลไม่สำเร็จ</div>';
    });
  }

  function renderCard(p) {
    const img = p.cover
      ? `<div class="product-img"><img src="${p.cover}" alt="${p.nameTH}" onerror="this.parentElement.textContent='📦'"></div>`
      : `<div class="product-img">📦</div>`;

    const actions = p.status === 'Pending' ? `
      <button class="btn-approve" onclick="approve('${p.id}')">✅ อนุมัติ</button>
      <button class="btn-reject"  onclick="openRejectModal('${p.id}')">❌ ปฏิเสธ</button>
    ` : `<span style="font-size:13px;color:#6e6e73;text-align:center">${p.status === 'Published' ? '✅ อนุมัติแล้ว' : '❌ ปฏิเสธแล้ว'}</span>`;

    return `
      <div class="product-card" id="card-${p.id}">
        ${img}
        <div class="product-info">
          <div class="product-name">${p.nameTH || 'ไม่ระบุ'}</div>
          ${p.nameEN ? `<div class="product-name-en">${p.nameEN}</div>` : ''}
          <div class="product-meta">
            ${p.category ? `<span class="meta-tag cat">📦 ${p.category}</span>` : ''}
            ${p.province ? `<span class="meta-tag">📍 ${p.province}</span>` : ''}
            ${p.priceRange ? `<span class="meta-tag">💰 ${p.priceRange}</span>` : ''}
            ${p.moq ? `<span class="meta-tag">📊 MOQ: ${p.moq}</span>` : ''}
            ${p.date ? `<span class="meta-tag date">📅 ${p.date}</span>` : ''}
          </div>
          <div class="seller-info">
            ${p.sellerName  ? `<span>👤 ${p.sellerName}</span>`  : ''}
            ${p.sellerEmail ? `<span>✉️ ${p.sellerEmail}</span>` : ''}
            ${p.sellerPhone ? `<span>📞 ${p.sellerPhone}</span>` : ''}
          </div>
          ${p.descriptionTH ? `<div class="product-desc">${p.descriptionTH}</div>` : ''}
        </div>
        <div class="product-actions">${actions}</div>
      </div>`;
  }

  // ── APPROVE ───────────────────────────────────────────
  function approve(id) {
    fetch(`${API}/api/admin/products/${id}/approve`, {
      method: 'POST',
      headers: { Authorization: `Bearer ${authToken}` },
    })
    .then(r => r.json())
    .then(data => {
      if (data.success) {
        removeCard(id);
        showToast('✅ อนุมัติสินค้าเรียบร้อยแล้ว!', 'success');
        loadStats();
      } else {
        showToast('เกิดข้อผิดพลาด: ' + data.error, 'error');
      }
    });
  }

  // ── REJECT ────────────────────────────────────────────
  function openRejectModal(id) {
    rejectTargetId = id;
    document.getElementById('rejectReason').value = '';
    document.getElementById('rejectModal').style.display = 'flex';
  }
  function closeRejectModal() {
    document.getElementById('rejectModal').style.display = 'none';
    rejectTargetId = '';
  }
  function confirmReject() {
    const reason = document.getElementById('rejectReason').value.trim();
    fetch(`${API}/api/admin/products/${rejectTargetId}/reject`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${authToken}` },
      body: JSON.stringify({ reason }),
    })
    .then(r => r.json())
    .then(data => {
      closeRejectModal();
      if (data.success) {
        removeCard(rejectTargetId);
        showToast('❌ ปฏิเสธสินค้าเรียบร้อยแล้ว', 'error');
        loadStats();
      }
    });
  }

  function removeCard(id) {
    const card = document.getElementById(`card-${id}`);
    if (card) {
      card.style.transition = 'opacity .3s, transform .3s';
      card.style.opacity = '0';
      card.style.transform = 'scale(.97)';
      setTimeout(() => {
        card.remove();
        const list = document.getElementById('productList');
        if (!list.children.length) {
          list.innerHTML = '<div class="empty-state"><div class="icon">🎉</div>ไม่มีสินค้าค้างพิจารณาแล้ว!</div>';
        }
      }, 300);
    }
  }

  // ── TOAST ─────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
  }

  // ── INIT ──────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('pitAdminToken');
    if (saved) {
      authToken = saved;
      // Verify token is still valid
      fetch(`${API}/api/admin/stats`, { headers: { Authorization: `Bearer ${authToken}` } })
      .then(r => {
        if (r.ok) showAdminPage();
        else { localStorage.removeItem('pitAdminToken'); }
      })
      .catch(() => { localStorage.removeItem('pitAdminToken'); });
    }
  });
</script>
</body>
</html>
